<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOXER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #EDE8DF; }
    canvas { display: block; }
    #upload-input { display: none; }

    .custom-input {
      position: absolute;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.35);
      color: rgba(0,0,0,0.75);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-align: center;
      width: 100px;
      outline: none;
      display: none;
      padding: 2px 4px;
      pointer-events: auto;
    }
    .custom-input::placeholder { color: rgba(0,0,0,0.25); font-style: italic; }
    .custom-input:focus { border-bottom-color: rgba(0,0,0,0.7); }
  </style>
</head>
<body>
  <input type="file" id="upload-input" accept="audio/*">
  <input type="text" id="custom-0" class="custom-input" placeholder="describe a sound…">
  <input type="text" id="custom-1" class="custom-input" placeholder="describe a sound…">
  <input type="text" id="custom-2" class="custom-input" placeholder="describe a sound…">
  <input type="text" id="custom-3" class="custom-input" placeholder="describe a sound…">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
