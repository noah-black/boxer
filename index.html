<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRUM EXTRACTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #EDE8DF; }
    canvas { display: block; }
    #upload-input { display: none; }
    #steps-input::-webkit-inner-spin-button,
    #steps-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    #steps-input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <input type="file" id="upload-input" accept="audio/*">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
